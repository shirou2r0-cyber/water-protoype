<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Water Relax Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// プレイヤー
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: 0,
  vy: 0,
  size: 15
};

// 入力
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// 粒（ストレス）
let particles = [];
for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 3 + Math.random() * 3
  });
}

// リップル
let ripples = [];

// 時間（揺らぎ用）
let time = 0;

// 更新
function update() {
  time += 0.01;

  // 入力（弱め＋遅延感）
  if (keys["ArrowUp"]) player.vy -= 0.05;
  if (keys["ArrowDown"]) player.vy += 0.05;
  if (keys["ArrowLeft"]) player.vx -= 0.05;
  if (keys["ArrowRight"]) player.vx += 0.05;

  // 慣性（水中感）
  player.vx *= 0.98;
  player.vy *= 0.98;

  player.x += player.vx;
  player.y += player.vy;

  // 画面内制限
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // 粒との接触
  particles = particles.filter(p => {
    let dx = player.x - p.x;
    let dy = player.y - p.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < player.size + p.size) {
      // リップル発生
      ripples.push({
        x: p.x,
        y: p.y,
        radius: 0,
        alpha: 0.5
      });
      return false;
    }
    return true;
  });

  // リップル更新
  ripples.forEach(r => {
    r.radius += 1.5;
    r.alpha *= 0.97;
  });

  ripples = ripples.filter(r => r.alpha > 0.01);
}

// 描画
function draw() {
  // 背景（残像で水っぽく）
  ctx.fillStyle = "rgba(0, 0, 20, 0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();

  // 水の揺らぎ
  ctx.translate(Math.sin(time) * 3, Math.cos(time * 0.8) * 3);

  // 粒
  particles.forEach(p => {
    ctx.fillStyle = "rgba(200,200,255,0.6)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // リップル
  ripples.forEach(r => {
    ctx.strokeStyle = "rgba(200,200,255," + r.alpha + ")";
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
  });

  // プレイヤー
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
