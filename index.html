<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Water Relax Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
    #replayButton {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      font-size: 18px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      display: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<button id="replayButton">Replay</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// プレイヤー
let player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: 0,
  vy: 0,
  size: 12
};

// 入力
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// 粒（ストレス）
let particles = [];
for (let i = 0; i < 20; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 5 + Math.random() * 4
  });
}

// リップル
let ripples = [];

// 時間（揺らぎ用）
let time = 0;

// 更新
function update() {
  time += 0.01;

  player.size = 10 + Math.sin(time * 2) * 1;
  
  // 入力（弱め＋遅延感）
  if (keys["ArrowUp"]) player.vy -= 0.02;
  if (keys["ArrowDown"]) player.vy += 0.02;
  if (keys["ArrowLeft"]) player.vx -= 0.02;
  if (keys["ArrowRight"]) player.vx += 0.02;

  // 慣性（水中感）
  player.vx *= 0.995;
  player.vy *= 0.995;

  player.x += player.vx;
  player.y += player.vy;

  // 画面内制限
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // 粒との接触
  particles = particles.filter(p => {
    let dx = player.x - p.x;
    let dy = player.y - p.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < player.size + p.size) {
      // リップル発生
      ripples.push({
        x: p.x,
        y: p.y,
        radius: 0,
        alpha: 0.5
      });
      return false;
    }
    return true;
  });

  // リップル更新
  ripples.forEach(r => {
    r.radius += 1.5;
    r.alpha *= 0.97;
  });

  ripples = ripples.filter(r => r.alpha > 0.01);
}

// 描画
function draw() {
  // 背景（残像で水っぽく）
  ctx.fillStyle = "rgba(0, 0, 20, 0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
    if (cleared) {
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // 水の揺らぎ
  let calm = particles.length / 20;

ctx.translate(
  Math.sin(time) * 4 * calm,
  Math.cos(time * 0.8) * 4 * calm
);

  // 粒
  particles.forEach(p => {
    ctx.fillStyle = "rgba(200,200,255,0.6)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // リップル
  ripples.forEach(r => {
    ctx.strokeStyle = "rgba(200,200,255," + r.alpha + ")";
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
  });

  // プレイヤー
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

let cleared = false;

// ループ
function loop() {
  update();

  if (particles.length === 0) {
    cleared = true;
  }

  draw();

  if (cleared) {
    document.getElementById("replayButton").style.display = "block";
  }

  requestAnimationFrame(loop);
}

loop();
  
document.getElementById("replayButton").onclick = () => {

  particles = [];
  
  for (let i = 0; i < 20; i++) {
      particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 5 + Math.random() * 4
    });
  }

  ripples = [];
  cleared = false;

  document.getElementById("replayButton").style.display = "none";
};

</script>
</body>
</html>
